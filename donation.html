<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Donation KHQR</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
    background:linear-gradient(180deg,#F8FAFC,#EEF4FF);
}

.card{
    width:100%;
    max-width:420px;
    background:#FFFFFF;
    border-radius:28px;
    padding:32px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.08);
}

.logo{
    width:80px;
    height:80px;
    margin:0 auto 24px;
    border-radius:20px;
    background:#0054A6;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:700;
}

h1{
    color:#111827;
    font-size:28px;
    margin-bottom:10px;
}

p{
    color:#6B7280;
    line-height:1.6;
}

.qr{
    width:100%;
    max-width:320px;
    margin:24px auto;
    display:block;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.10);
}

.button{
    display:block;
    width:100%;
    padding:16px;
    border-radius:16px;
    background:#0054A6;
    color:white;
    text-decoration:none;
    font-size:16px;
    font-weight:700;
    margin-top:8px;
}

.secondary{
    display:block;
    width:100%;
    padding:16px;
    border-radius:16px;
    background:#F3F4F6;
    color:#111827;
    text-decoration:none;
    font-size:16px;
    font-weight:600;
    margin-top:12px;
}

.note{
    margin-top:20px;
    font-size:14px;
    color:#6B7280;
    line-height:1.8;
}

</style>
</head>
<body>

<div class="card">

    <div class="logo">KH</div>

    <h1>Donate via KHQR</h1>

    <p>
        Scan this KHQR using ACLEDA, ABA,
        Wing, or any KHQR-supported banking app.
    </p>

    <img
        class="qr"
        src="https://www.acledabank.com.kh/qr/toanchet-manual/FKC-QR-KHR.jpg"
        alt="KHQR Donation">

    <a
        class="button"
        href="https://acledabank.com.kh/acleda?id=bill&billId=1095&comcode=KH0144">

        Open ACLEDA App

    </a>

    <a
        class="secondary"
        href="https://www.acledabank.com.kh/qr/toanchet-manual/FKC-QR-KHR.jpg"
        target="_blank">

        View QR Full Size

    </a>

    <div class="note">

        If ACLEDA does not open inside Facebook or Instagram:

        <br><br>

        1. Tap ⋯ menu

        <br>

        2. Select "Open in Browser"

        <br>

        3. Tap "Open ACLEDA App"

    </div>

</div>

</body>
</html>
