<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App Cafe</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <!-- App Header -->
    <div class="app-header">

        <div>
            <h1>Mini Cafe</h1>
            <p>Powered by JBright Mini App</p>
        </div>

        <div class="app-badge">
            LIVE
        </div>

    </div>


    <!-- Receipt Card -->
    <div class="receipt-card">

        <div class="receipt-top">

            <div>
                <h2>Cafe Receipt</h2>
                <span>#ORDER001</span>
            </div>

            <div class="receipt-status">
                ORDER
            </div>

        </div>


        <div class="item">
            <span>Americano</span>
            <span>$3.50</span>
        </div>

        <div class="item">
            <span>Croissant</span>
            <span>$2.00</span>
        </div>

        <div class="divider"></div>


        <div class="item total">
            <span>Total</span>
            <span>$5.50</span>
        </div>


        <button
            class="pay-btn"
            onclick="payNow()">

            Pay with Banking App

        </button>

    </div>


    <!-- Permission Card -->
    <div class="permission-section">

        <div class="permission-top">

            <div>
                <h3>Device Permissions</h3>
                <p>
                    Access native device capabilities
                </p>
            </div>

            <div class="permission-icon">
                ⚙️
            </div>

        </div>

        <button
            class="secondary-btn"
            onclick="openPermissionPage()">

            Open Permission Setup

        </button>

    </div>

</div>



<!-- Loading -->
<div id="loading" class="loading-overlay">

    <div class="loading-card">

        <div class="loader"></div>

        <h2>Processing Payment</h2>

        <p>
            Waiting for banking confirmation...
        </p>

    </div>

</div>


<script src="js/jbright.js"></script>
<script src="js/app.js"></script>

</body>
</html>
